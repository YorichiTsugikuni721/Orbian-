<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Chart Test</title>
    <link rel="icon" type="image/png" href="logo.png?v=6">
    <link rel="apple-touch-icon" href="logo.png?v=6">
    <!-- React & ReactDOM (Development) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel (for JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Recharts -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <!-- Tailwind (for styling) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chart-container {
            width: 800px;
            height: 400px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        const data = [
            { Year: "2015", Psychology: 120, Business: 110, Biology: 100 },
            { Year: "2016", Psychology: 130, Business: 95, Biology: 105 },
            { Year: "2017", Psychology: 115, Business: 105, Biology: 110 },
            { Year: "2018", Psychology: 125, Business: 120, Biology: 90 },
            { Year: "2019", Psychology: 110, Business: 130, Biology: 85 },
            { Year: "2020", Psychology: 135, Business: 100, Biology: 95 },
            { Year: "2021", Psychology: 105, Business: 115, Biology: 120 },
            { Year: "2022", Psychology: 140, Business: 125, Biology: 130 },
        ];

        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                return (
                    <div className="bg-slate-800 border border-slate-700 p-3 rounded-lg shadow-lg text-sm">
                        <p className="font-bold text-slate-200 mb-1">{label}</p>
                        {payload.map((entry, index) => (
                            <p key={index} style={{ color: entry.color }}>
                                {entry.name}: {entry.value}
                            </p>
                        ))}
                    </div>
                );
            }
            return null;
        };

        const AreaChartExample = () => {
            return (
                <div className="chart-container">
                    <h2 className="text-xl font-bold mb-4 text-center">Department Growth Over Years</h2>
                    <ResponsiveContainer width="100%" height="100%">
                        <AreaChart
                            data={data}
                            margin={{ top: 10, right: 30, left: 0, bottom: 0 }}
                        >
                            <defs>
                                <linearGradient id="colorBio" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.6} />
                                    <stop offset="95%" stopColor="#3b82f6" stopOpacity={0} />
                                </linearGradient>
                                <linearGradient id="colorBus" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="5%" stopColor="#8b5cf6" stopOpacity={0.6} />
                                    <stop offset="95%" stopColor="#8b5cf6" stopOpacity={0} />
                                </linearGradient>
                                <linearGradient id="colorPsy" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="5%" stopColor="#ec4899" stopOpacity={0.6} />
                                    <stop offset="95%" stopColor="#ec4899" stopOpacity={0} />
                                </linearGradient>
                            </defs>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#334155" />
                            <XAxis dataKey="Year" stroke="#94a3b8" tick={{ fontSize: 12 }} />
                            <YAxis stroke="#94a3b8" tick={{ fontSize: 12 }} />
                            <Tooltip content={<CustomTooltip />} />
                            <Area type="monotone" dataKey="Biology" stroke="#3b82f6" fillOpacity={1} fill="url(#colorBio)" strokeWidth={2} />
                            <Area type="monotone" dataKey="Business" stroke="#8b5cf6" fillOpacity={1} fill="url(#colorBus)" strokeWidth={2} />
                            <Area type="monotone" dataKey="Psychology" stroke="#ec4899" fillOpacity={1} fill="url(#colorPsy)" strokeWidth={2} />
                        </AreaChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AreaChartExample />);
    </script>
</body>

</html>
