<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbian AI — Master Gate</title>
    <link rel="icon" type="image/png" href="../logo.png?v=6">
    <link rel="apple-touch-icon" href="../logo.png?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="secret-style.css">
</head>

<body>

    <div class="master-card">
        <!-- LEFT: DEV INFO -->
        <div class="dev-side">
            <div class="dev-content">
                <h1>MASTER<br>ACCESS</h1>
                <p>Welcome, Creator. This is the restricted entrance to the AI Orbian core. Unauthorized modding will be
                    blocked.</p>
                <div class="dev-tag">System Administrator</div>
            </div>
        </div>

        <!-- RIGHT: SECRET FORM -->
        <div class="gate-side">
            <form id="secretLoginForm" autocomplete="off">
                <h2>Authorize</h2>
                <div class="entry-group">
                    <label>MASTER EMAIL</label>
                    <div class="entry-wrapper">
                        <input type="email" id="secretEmail" placeholder="creator@orbian.ai" required>
                        <span class="entry-icon">🔐</span>
                    </div>
                </div>
                <div class="entry-group">
                    <label>MASTER PASSWORD</label>
                    <div class="entry-wrapper">
                        <input type="password" id="secretPassword" placeholder="••••••••••••" required>
                        <span class="entry-icon">🔑</span>
                    </div>
                </div>

                <div class="gate-actions">
                    <a href="login" class="back-link">Return to User Gate</a>
                </div>

                <button type="submit" class="gate-btn" id="gateBtn">
                    <span>Unlock Core</span>
                    <div class="gate-loader hidden" id="gateLoader"></div>
                </button>

                <div class="status-indicator">
                    <span class="dot"></span>
                    <span class="status-text">Backend: Connected</span>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast from original auth -->
    <div class="toast" id="toast"></div>

    <script src="secret-auth.js"></script>
</body>

</html>
