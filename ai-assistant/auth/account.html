<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Access — Orbian</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logo.png?v=6">
    <link rel="icon" type="image/png" sizes="192x192" href="../logo.png?v=6">
    <link rel="apple-touch-icon" href="../logo.png?v=6">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .settings-container {
            width: 100%;
            max-width: 600px;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .settings-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
        }

        .settings-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Avatar Section */
        .profile-avatar-section {
            text-align: center;
            margin-bottom: 32px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin: 0 auto 12px;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        .profile-name {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .profile-email {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        .profile-joined {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 8px;
        }

        /* Form Cards */
        .settings-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 24px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .settings-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #e2e8f0;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-hint {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* Buttons */
        .btn-save {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #059669;
            color: #fff;
        }

        .toast.error {
            background: #dc2626;
            color: #fff;
        }

        /* Danger Zone */
        .danger-zone {
            border-color: rgba(239, 68, 68, 0.2) !important;
        }

        .danger-zone .card-title {
            color: #ef4444;
        }

        .btn-danger {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            background: transparent;
            color: #ef4444;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }
    </style>
</head>

<body>
    <div class="settings-container">
        <!-- Header -->
        <div class="settings-header">
            <a href="../app" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </a>
            <h1>Account Settings</h1>
        </div>

        <!-- Avatar -->
        <div class="profile-avatar-section">
            <div class="avatar-large" id="avatarLetter">?</div>
            <div class="profile-name" id="displayName">Loading...</div>
            <div class="profile-email" id="displayEmail">...</div>
            <div class="profile-joined" id="displayJoined"></div>
        </div>

        <!-- Username -->
        <div class="settings-card">
            <div class="card-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                Username
            </div>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="usernameInput" placeholder="Enter new username">
                <div class="form-hint">This is visible to others and shown in your profile.</div>
            </div>
            <button class="btn-save" id="saveUsernameBtn">Save Username</button>
        </div>

        <!-- Backup Email -->
        <div class="settings-card">
            <div class="card-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                    <polyline points="22,6 12,13 2,6" />
                </svg>
                Backup Email
            </div>
            <div class="form-group">
                <label>Primary Email (cannot change)</label>
                <input type="email" id="primaryEmail" disabled>
            </div>
            <div class="form-group">
                <label>Backup / Recovery Email</label>
                <input type="email" id="backupEmailInput" placeholder="Enter backup email">
                <div class="form-hint">Used for account recovery if you lose access to your primary email.</div>
            </div>
            <button class="btn-save" id="saveBackupBtn">Save Backup Email</button>
        </div>

        <!-- Danger Zone -->
        <div class="settings-card danger-zone">
            <div class="card-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                    <line x1="12" y1="9" x2="12" y2="13" />
                    <line x1="12" y1="17" x2="12.01" y2="17" />
                </svg>
                Danger Zone
            </div>
            <button class="btn-danger" id="logoutAllBtn">Logout from All Devices</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const FLASK_URL = 'http://localhost:5001';

        // Get logged in user
        const userData = JSON.parse(localStorage.getItem('ai_assistant_user') || 'null');
        if (!userData) {
            window.location.href = 'login';
        }

        const userId = userData?.id;

        // Load profile on page load
        async function loadProfile() {
            try {
                const res = await fetch(`${FLASK_URL}/api/user/profile?user_id=${userId}`);
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('avatarLetter').textContent = (data.username || '?')[0].toUpperCase();
                    document.getElementById('displayName').textContent = data.username;
                    document.getElementById('displayEmail').textContent = data.email;
                    document.getElementById('displayJoined').textContent = `Member since ${new Date(data.created_at).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' })}`;
                    document.getElementById('usernameInput').value = data.username;
                    document.getElementById('primaryEmail').value = data.email;
                    document.getElementById('backupEmailInput').value = data.backup_email || '';
                }
            } catch (err) {
                console.error('Profile load error:', err);
            }
        }

        // Save Username
        document.getElementById('saveUsernameBtn').addEventListener('click', async () => {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) return showToast('Username cannot be empty', 'error');

            const btn = document.getElementById('saveUsernameBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const res = await fetch(`${FLASK_URL}/api/user/profile`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, username })
                });
                const data = await res.json();

                if (res.ok) {
                    showToast('Username updated!', 'success');
                    // Update localStorage too
                    userData.username = username;
                    localStorage.setItem('ai_assistant_user', JSON.stringify(userData));
                    loadProfile();
                } else {
                    showToast(data.error || 'Failed', 'error');
                }
            } catch (err) {
                showToast('Server error', 'error');
            }
            btn.disabled = false;
            btn.textContent = 'Save Username';
        });

        // Save Backup Email
        document.getElementById('saveBackupBtn').addEventListener('click', async () => {
            const backupEmail = document.getElementById('backupEmailInput').value.trim();
            if (!backupEmail) return showToast('Enter a backup email', 'error');

            const btn = document.getElementById('saveBackupBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const res = await fetch(`${FLASK_URL}/api/user/profile`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, backup_email: backupEmail })
                });
                const data = await res.json();

                if (res.ok) {
                    showToast('Backup email saved!', 'success');
                    loadProfile();
                } else {
                    showToast(data.error || 'Failed', 'error');
                }
            } catch (err) {
                showToast('Server error', 'error');
            }
            btn.disabled = false;
            btn.textContent = 'Save Backup Email';
        });

        // Logout all
        document.getElementById('logoutAllBtn').addEventListener('click', () => {
            if (confirm('Are you sure you want to logout from all devices?')) {
                localStorage.removeItem('ai_assistant_user');
                localStorage.removeItem('orbian_token');
                window.location.href = 'login';
            }
        });

        // Toast
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        loadProfile();
    </script>
</body>

</html>
