[build]
  publish = "ai-assistant"

[[redirects]]
  from = "/app/*"
  to = "/app.html"
  status = 200
  force = false

[[redirects]]
  from = "/auth/login"
  to = "/auth/login.html"
  status = 200

[[redirects]]
  from = "/auth/login-mobile"
  to = "/auth/login-mobile.html"
  status = 200

[[redirects]]
  from = "/auth/signup-mobile"
  to = "/auth/signup-mobile.html"
  status = 200

[[redirects]]
  from = "/auth/account"
  to = "/auth/account.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/payment"
  to = "/payment.html"
  status = 200

[[redirects]]
  from = "/ppt-studio"
  to = "/ppt-studio.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
